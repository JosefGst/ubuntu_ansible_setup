---
- name: Install Git on Ubuntu 24.04
  hosts: localhost
  connection: local
  tasks:
    - name: Install apt software
      become: true
      ansible.builtin.apt:
        name:
          - vim
          - git
          - libfuse2t64
          - tmux
        state: latest
        update_cache: yes
    
    - name: Add Google Chrome GPG key
      become: true
      apt_key:
        url: https://dl-ssl.google.com/linux/linux_signing_key.pub
        state: present

    - name: Add Google Chrome repository
      become: true
      apt_repository:
        repo: deb http://dl.google.com/linux/chrome/deb/ stable main
        state: present

    - name: Install Google Chrome
      become: true
      apt:
        name: google-chrome-stable
        state: latest
        update_cache: yes

    - name: Install Joplin 
      become: false
      ansible.builtin.shell:
        cmd: "wget -O - https://raw.githubusercontent.com/laurent22/joplin/dev/Joplin_install_and_update.sh | bash"
        creates: ~/.joplin/Joplin.AppImage  # Prevents re-running if already installed
