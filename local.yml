---
- name: Install Git on Ubuntu 24.04
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  tasks:
    - name: Install apt software
      apt:
        name:
          - vim
          - git
          - libfuse2t64
          - tmux
          - curl
          - btop
        state: latest
        update_cache: yes
    
